  aspiratore_master_profilo_inizializzazione:
    alias: ASPIRATORE Master - Profilo Inizializzazione
    sequence:
      - action: script.aspiratore_master_profilo_umidita
      - action: script.aspiratore_master_profilo_rilevamento
      - action: input_boolean.turn_off
        data: {}
        target:
          entity_id:
            - input_boolean.aspiratore_master_accendi_spegni_aspiratore
            - input_boolean.aspiratore_master_finestra_impostazioni_generali            
            - input_boolean.aspiratore_master_finestra_impostazioni_umidita
            - input_boolean.aspiratore_master_finestra_impostazioni_rilevamento
            - input_boolean.aspiratore_master_finestra_impostazioni_informazioni
    mode: restart
    icon: mdi:cursor-pointer

  aspiratore_master_panic_botton:
    alias: Panic Botton
    description: >
      Arresto generale di sicurezza del sistema Aspiratore Master.
      Lo script annulla tutti i timer di umidità e rilevamento, spegne le spie,
      disattiva i boolean di blocco ciclo loop e porta l’aspiratore in stato OFF.
    sequence:
      - alias: Annulla timer umidità
        action: timer.cancel
        target:
          entity_id:
            - timer.aspiratore_master_permanenza_umidita
            - timer.aspiratore_master_ciclo
            - timer.aspiratore_master_durata_aspirazione
      - alias: Annulla timer rilevamento
        action: timer.cancel
        target:
          entity_id:
            - timer.aspiratore_master_ciclo_rilevamento
            - timer.aspiratore_master_permanenza_rilevamento
      - alias: Spegni spie umidità e rilevamento
        action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.aspiratore_master_spia_umidita
            - input_boolean.aspiratore_master_spia_rilevamento
      - alias: Disattiva blocco ciclo loop umidità e Disattiva blocco ciclo loop rilevamento
        action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.aspiratore_master_evita_ciclo_loop_umidita
            - input_boolean.aspiratore_master_evita_ciclo_loop_rilevamento
      - alias: Spegni aspiratore
        action: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.aspiratore_master_accendi_spegni_aspiratore_impostazioni_rilevamento
            - input_boolean.aspiratore_master_accendi_spegni_aspiratore_impostazioni_umidita
            - input_boolean.aspiratore_master_accendi_spegni_aspiratore
    mode: restart
    icon: mdi:cursor-pointer
