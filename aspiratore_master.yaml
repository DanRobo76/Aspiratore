  aspiratore_master_upgrade_sensors:
    alias: ASPIRATORE Master - Agg. Entità (Attendere)
    sequence:
      - delay: "00:00:05"  # <--- Fondamentale: aspetta che il sistema sia pronto
      - action: script.aspiratore_master_aggiorna_elenco_entita_aspiratori
      - action: script.aspiratore_master_aggiorna_elenco_entita_umidita_interna
      - action: script.aspiratore_master_aggiorna_elenco_entita_rilevamento
      - delay: "00:00:02"
      - action: homeassistant.update_entity
        target:
          entity_id:
            - input_text.aspiratore_master_last_actuator_entity
            - input_text.aspiratore_master_last_humidity_internal_entity
            - input_text.aspiratore_master_last_motion_sensor_internal_entity
            - input_select.aspiratore_master_selected_actuator_entity
            - input_select.aspiratore_master_selected_motion_sensor_internal_entity
            - input_select.aspiratore_master_selected_humidity_internal_entity
            - sensor.aspiratore_master_versione_repository
    mode: restart
    icon: mdi:cursor-pointer
    description: Aggiorna in sequenza tutte le entità e i sensori della aspiratore.

  aspiratore_master_profilo_umidita:
    alias: ASPIRATORE Master - Profilo Umidità Interna di Avvio
    sequence:
      - action: input_boolean.turn_on
        target:
          entity_id:
            - input_boolean.aspiratore_master_accendi_spegni_aspiratore_impostazioni_umidita
            - input_boolean.aspiratore_master_impostazione_controllo_stato_umidita
            - input_boolean.aspiratore_master_impostazione_tempo_massimo_aspiratore_umidita
      - action: input_datetime.set_datetime
        data:
          time: "08:00:00"
        target:
          entity_id: input_datetime.aspiratore_master_impostazioni_umidita_start_time
      - action: input_datetime.set_datetime
        data:
          time: "20:00:00"
        target:
          entity_id: input_datetime.aspiratore_master_impostazioni_umidita_end_time
      - action: input_number.set_value
        data:
          value: 75
        target:
          entity_id: input_number.aspiratore_master_umidita_avvio
      - action: input_number.set_value
        data:
          value: 60
        target:
          entity_id: input_number.aspiratore_master_durata_umidita_per_attivazione
      - action: input_number.set_value
        data:
          value: 5
        target:
          entity_id: input_number.aspiratore_master_intervallo_riprova_umidita
      - action: input_number.set_value
        data:
          value: 300
        target:
          entity_id: input_number.aspiratore_master_durata_aspirazione_per_umidita
      - action: input_number.set_value
        data:
          value: 0
        target:
          entity_id: input_number.aspiratore_master_offset_umidita
    mode: restart
    icon: mdi:cursor-pointer
  
  aspiratore_master_profilo_rilevamento:
    alias: ASPIRATORE Master - Profilo rilevamento di Avvio
    sequence:
      - action: input_boolean.turn_on
        target:
          entity_id:
            - input_boolean.aspiratore_master_accendi_spegni_aspiratore_impostazioni_rilevamento
            - input_boolean.aspiratore_master_impostazione_controllo_stato_rilevamento
