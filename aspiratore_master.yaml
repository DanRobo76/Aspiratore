################### Inizio Creazione Sensori Principali della aspiratore  #################################################################################################################################################
sensor:
  - platform: rest
    name: "Aspiratore Master Versione Repository"                              # [CONFIGURAZIONE 0 RICHIAMI] [INTERFACCIA, PIU' RICHIAMI] [AUTOMAZIONE, PIU’ RICHIAMI] SENSORE PER VISUALIZZARE LA VERSIONE CORRENTE NEL REPOSITORY DI GITHUB, DA CONFRONTARE CON LA VERSIONE CORRENTE INSTALLATA IN HOME ASSISTANT TRAMITE AUTOMAZIONE
    unique_id: aspiratore_master_versione_repository
    resource: https://api.github.com/repos/DanRobo76/Aspiratore/releases/latest
    value_template: >-
      {% if value_json and value_json.tag_name %}
        {{ value_json.tag_name }}
      {% else %}
        Errore Connessione
      {% endif %}
    headers:
      Accept: application/vnd.github.v3+json
      Content-Type: application/json
      User-Agent: Home Assistant REST sensor
    scan_interval: 86400                                                        # OGNI N° SECONDI RIPETE LA SCANSIONE
    timeout: 15
    icon: mdi:check-decagram-outline

template:
################### Inizio Creazione Sensori di Lettura UMIDITA' e ATTUATORI (Switch/Fan) , INTERNA INSTALLATE IN HOME ASSISTANT  #########################################################################################
  - sensor:
      - name: "Aspiratore Master Versione Corrente"
        unique_id: aspiratore_master_versione_corrente
        state: "v.1.0.2"
        icon: mdi:check-decagram-outline

  - sensor:
      - name: "ASPIRATORE Master Umidità Interna Selezionata"
        unique_id: aspiratore_master_umidita_interna_selezionata
        state: >
          {% set entity_id = states('input_select.aspiratore_master_selected_humidity_internal_entity') %}
          {% set offset = states('input_number.aspiratore_master_offset_umidita') | float(0) %}
          
          {% if entity_id and states(entity_id) not in ["none", "", "unknown", "unavailable", "Aggiorna Elenco Entità Umidità Interna"] %}
            {% set valore_reale = states(entity_id) | float(0) %}
            {% set calcolo = (valore_reale + offset) | round(1) %}
            {# Limita il valore tra 0 e 100 #}
            {{ ([0, calcolo, 100] | sort)[1] }}
          {% else %}
            {{ none }}
          {% endif %}
        unit_of_measurement: "%"
        device_class: humidity
        icon: mdi:water-percent

  - sensor:
      - name: "ASPIRATORE Master Nome Attuatore Selezionato"
        unique_id: aspiratore_master_nome_attuatore_selezionato
        state: >
          {% set id_reale = states('input_select.aspiratore_master_selected_actuator_entity') %}
          {% if id_reale not in ["none", "", "unknown", "sconosciuto", "Non disponibile", "unavailable", "Aggiorna Elenco Entità Attuatore (Switch/Fan)"] %}
            {% set nome = state_attr(id_reale, 'friendly_name') %}
            {{ nome if nome not in ["none", ''] else id_reale }}
          {% else %}
            Aggiorna Entità
          {% endif %}
        icon: mdi:memory

  - sensor:
      - name: "ASPIRATORE Master Nome Rilevamento Selezionato"
        unique_id: aspiratore_master_nome_rilevamento_selezionato
        state: >
          {% set id_reale = states('input_select.aspiratore_master_selected_motion_sensor_internal_entity') %}
          {% if id_reale not in ["none", "", "unknown", "sconosciuto", "Non disponibile", "unavailable", "Aggiorna Elenco Entità Rilevamento"] %}
            {% set nome = state_attr(id_reale, 'friendly_name') %}
            {{ nome if nome not in ["none", ''] else id_reale }}
          {% else %}
            Aggiorna Entità
          {% endif %}
        icon: mdi:memory

  - sensor:
      - name: "ASPIRATORE Master Nome Umidità Interna Selezionata"
        unique_id: aspiratore_master_nome_umidita_interna_selezionata
        state: >
          {% set id_reale = states('input_select.aspiratore_master_selected_humidity_internal_entity') %}
          {% if id_reale not in ["none", "", "unknown", "sconosciuto", "Non disponibile", "unavailable", "Aggiorna Elenco Entità Umidità Interna"] %}
            {% set nome = state_attr(id_reale, 'friendly_name') %}
            {{ nome if nome not in ["none", ''] else id_reale }}
          {% else %}
            Aggiorna Entità
          {% endif %}
        icon: mdi:memory

  - binary_sensor:
      - name: "ASPIRATORE Master Valore Attuatore Selezionato"
        unique_id: aspiratore_master_valore_attuatore_selezionato
        device_class: running
        state: >
          {% set entity_id = states('input_select.aspiratore_master_selected_actuator_entity') %}
          {% if entity_id and states(entity_id) not in ["none", "", "unknown", "sconosciuto", "Non disponibile", "unavailable", "Aggiorna Elenco Entità Attuatore (Switch/Fan)"] %}
            {{ states(entity_id) }}
          {% else %}
            off
          {% endif %}
        icon: mdi:memory

  - binary_sensor:
      - name: "ASPIRATORE Master Stato Rilevamento Selezionato"
        unique_id: aspiratore_master_stato_rilevamento_selezionato
        device_class: motion
        state: >
          {% set entity_id = states('input_select.aspiratore_master_selected_motion_sensor_internal_entity') %}
          {% if entity_id and states(entity_id) not in ["none", "", "unknown", "sconosciuto", "Non disponibile", "unavailable", "Aggiorna Elenco Entità Rilevamento"] %}
            {{ states(entity_id) }}
          {% else %}
            off
          {% endif %}
        icon: mdi:memory

  - binary_sensor:
      - name: "Aspiratore Master Errore Configurazione"
        unique_id: aspiratore_master_errore_configurazione
        device_class: problem
        state: >
          {{
            states('binary_sensor.aspiratore_master_stato_rilevamento_selezionato') in [
              'unknown', 'unavailable', 'none', '', 'sconosciuto', 'Non disponibile',
              'Aggiorna Elenco Entità Rilevamento',
              'Aggiorna Elenco Entità Attuatore (Switch/Fan)',
              'Aggiorna Elenco Entità Umidità Interna'
            ]
            or
            states('input_select.aspiratore_master_selected_motion_sensor_internal_entity') in [
              'unknown', 'unavailable', 'none', '', 'sconosciuto', 'Non disponibile',
              'Aggiorna Elenco Entità Rilevamento',
              'Aggiorna Elenco Entità Attuatore (Switch/Fan)',
              'Aggiorna Elenco Entità Umidità Interna'
            ]
            or
            states('input_select.aspiratore_master_selected_actuator_entity') in [
              'unknown', 'unavailable', 'none', '', 'sconosciuto', 'Non disponibile',
              'Aggiorna Elenco Entità Rilevamento',
              'Aggiorna Elenco Entità Attuatore (Switch/Fan)',
              'Aggiorna Elenco Entità Umidità Interna'
            ]
            or
            states('input_select.aspiratore_master_selected_humidity_internal_entity') in [
              'unknown', 'unavailable', 'none', '', 'sconosciuto', 'Non disponibile',
              'Aggiorna Elenco Entità Rilevamento',
              'Aggiorna Elenco Entità Attuatore (Switch/Fan)',
              'Aggiorna Elenco Entità Umidità Interna'
            ]
            or
            states('sensor.aspiratore_master_umidita_interna_selezionata') in [
              'unknown', 'unavailable', 'none', '', 'sconosciuto', 'Non disponibile',
              'Aggiorna Elenco Entità Rilevamento',
              'Aggiorna Elenco Entità Attuatore (Switch/Fan)',
              'Aggiorna Elenco Entità Umidità Interna'
            ]
          }}
        icon: mdi:fan-alert
################### FINE Creazione Sensori di Lettura TEMPERATURA ESTERNA, INTERNA E UMIDITA' ESTERNA, INTERNA INSTALLATE IN HOME ASSISTANT  ###############################################################################

################### Inizio Creazione Etichette Interfaccia Lovelace ########################################################################################################################################################
input_text:
  aspiratore_master_last_actuator_entity:
    name: "Ultima Entità Attuatore Valido"
    icon: mdi:form-textbox

  aspiratore_master_last_humidity_internal_entity:
    name: "Ultima Entità Umidità interna Selezionata"
    icon: mdi:form-textbox
    
  aspiratore_master_last_motion_sensor_internal_entity:
    name: "Ultima Entità Rilevamento Selezionata"
    icon: mdi:form-textbox

input_select:
  aspiratore_master_selected_actuator_entity:                                  # [CONFIGURAZIONE PIU' RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI] SENSORE DI MEMORIZZAZIONE DI TUTTE LE ENTITA' SWITCH/FAN' INSTALLATI IN HOME ASSISTANT
    name: Seleziona Entità Attuatore (Switch/Fan)
    options:
      - "Aggiorna Elenco Entità Attuatore (Switch/Fan)"
    icon: mdi:form-textbox

  aspiratore_master_selected_humidity_internal_entity:                         # [CONFIGURAZIONE PIU' RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI] SENSORE DI MEMORIZZAZIONE DI TUTTE LE ENTITA' DI UMIDITA' INSTALLATI IN HOME ASSISTANT
    name: Seleziona Entità Umidità
    options:
      - "Aggiorna Elenco Entità Umidità Interna"
    icon: mdi:form-textbox

  aspiratore_master_selected_motion_sensor_internal_entity:                    # [CONFIGURAZIONE PIU' RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI] SENSORE DI MEMORIZZAZIONE DI TUTTE LE ENTITA' DI RILEVAMENTO' INSTALLATI IN HOME ASSISTANT
    name: Seleziona Entità di Rilevamento
    options:
      - "Aggiorna Elenco Entità Rilevamento"
    icon: mdi:form-textbox

input_number:
  aspiratore_master_offset_umidita:                                           # [CONFIGURAZIONE, PIU’ RICHIAMI] [INTERFACCIA PIU’ RICHIAMI] SENSORE DI MEMORIZZAZIONE DELL'OFFSET PER L'UMIDITA' CHE VERRA' SOMMATA NEL SENSORE aspiratore_master_umidita_interna_selezionata
    name: "Offset Umidità"
    min: -100
    max: 100
    step: 0.1
    unit_of_measurement: "%"
    icon: mdi:counter

  aspiratore_master_umidita_avvio:                                             # [CONFIGURAZIONE, PIU’ RICHIAMI] [INTERFACCIA PIU’ RICHIAMI] SENSORE DI AVVIO DELL'ASPIRATORE PER L'UMIDITA' INTERNA RILEVATA
    name: "Soglia Umidità"
    min: 0
    max: 100
    step: 0.1
    unit_of_measurement: "%"
    icon: mdi:counter

  aspiratore_master_durata_umidita_per_attivazione:
    name: "Durata Umidità"
    min: 1
    max: 86340                                                                # 24 ore - 1 minuto
    step: 1
    unit_of_measurement: 's'
    mode: box
    icon: mdi:counter

  aspiratore_master_intervallo_riprova_umidita:
    name: "Durata Controllo Aspiratore"
    min: 1
    max: 86340                                                                # 24 ore - 1 minuto
    step: 1
    unit_of_measurement: 's'
    mode: box
    icon: mdi:counter

  aspiratore_master_durata_rilevamenti_per_attivazione:
    name: "Durata Aspirazione"
    min: 1
    max: 86340                                                                # 24 ore - 1 minuto
    step: 1
    unit_of_measurement: 's'
    mode: box
    icon: mdi:counter

  aspiratore_master_intervallo_riprova_rilevamento:
    name: "Durata Controllo Aspiratore"
    min: 1
    max: 86340                                                                # 24 ore - 1 minuto
    step: 1
    unit_of_measurement: 's'
    mode: box
    icon: mdi:counter

  aspiratore_master_durata_aspirazione_per_umidita:
    name: "Durata Aspirazione"
    min: 1
    max: 86340                                                                # 24 ore - 1 minuto
    step: 1
    unit_of_measurement: 's'
    mode: box
    icon: mdi:counter
################### Fine Creazione Etichette Interfaccia Lovelace  #########################################################################################################################################################

################### Inizio Creazione Switch Booleani impiegati nell'Interfaccia Lovelace per mostrare o meno le Opzioni ####################################################################################################
input_boolean:
  aspiratore_master_finestra_impostazioni_generali:                            # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]
    name: "Impostazioni Generali"
    initial: false
    icon: mdi:memory

  aspiratore_master_finestra_impostazioni_umidita:                             # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]
    name: "Impostazioni Umidità"
    initial: false
    icon: mdi:water-percent

  aspiratore_master_finestra_impostazioni_rilevamento:                         # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]
    name: "Impostazioni Rilevamento"
    initial: false
    icon: mdi:motion-sensor

  aspiratore_master_finestra_impostazioni_informazioni:                        # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]
    name: "Informazioni"
    initial: false
    icon: mdi:information-slab-box

  aspiratore_master_mostra_nascondi_aspiratore_applicazione:                   # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO PER MOSTRARE O MENO IL PANNELLO DELL'APPLICAZIONE
    name: "Interruttore Impostazioni Rilevamento"
    icon: mdi:toggle-switch-variant-off

  aspiratore_master_accendi_spegni_aspiratore:                                 # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO DELL'ASPIRATORE
    name: "Interruttore Aspiratore"
    icon: mdi:toggle-switch-variant-off

  aspiratore_master_accendi_spegni_aspiratore_impostazioni_umidita:            # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO PANNELLO OPZIONI CORRELATI ALL'UMIDITA'
    name: "Interruttore Impostazioni Umidità"
    icon: mdi:toggle-switch-variant-off
    
  aspiratore_master_accendi_spegni_aspiratore_impostazioni_rilevamento:        # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO PANNELLO OPZIONI CORRELATI AL rilevamento
    name: "Interruttore Impostazioni Rilevamento"
    icon: mdi:toggle-switch-variant-off

  aspiratore_master_spia_umidita:                                              # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO SPIA UMIDITA'
    name: "Spia Umidità"
    icon: mdi:water-percent

  aspiratore_master_spia_rilevamento:                                          # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO SPIA RILEVAZIONE
    name: "Spia Rilevamento"
    icon: mdi:motion-sensor

  aspiratore_master_impostazione_controllo_stato_umidita:                      # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO CORRELATO ALLA VERIFICA UMIDITA' CICLICAMENTE
    name: "Controllo Stato Aspiratore"
    icon: mdi:toggle-switch-variant-off

  aspiratore_master_impostazione_controllo_stato_rilevamento:                      # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO CORRELATO ALLA VERIFICA UMIDITA' CICLICAMENTE
    name: "Controllo Stato Aspiratore"
    icon: mdi:toggle-switch-variant-off

  aspiratore_master_impostazione_tempo_massimo_aspiratore_umidita:                     # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO CORRELATO ALLA MASSIMA DURATA DI ASPIRAZIONE
    name: "Spegnimento Automatico Aspiratore"
    icon: mdi:toggle-switch-variant-off

  aspiratore_master_impostazione_tempo_massimo_aspiratore_rilevatore:          # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, PIU' RICHIAMI]  SENSORE BOOLEANO DI ACCENSIONE O SPEGNIMENTO CORRELATO ALLA MASSIMA DURATA DI ASPIRAZIONE
    name: "Spegnimento Automatico Aspiratore"
    icon: mdi:toggle-switch-variant-off

  aspiratore_master_evita_ciclo_loop_umidita:                                  # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, 0 RICHIAMI]  SENSORE BOOLEANO CHE EVITA IL LOOP
    name: "Evita Ciclo Loop Umidità"
    icon: mdi:shield-lock

  aspiratore_master_evita_ciclo_loop_rilevamento:                              # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, 0 RICHIAMI]  SENSORE BOOLEANO CHE EVITA IL LOOP
    name: "Evita Ciclo Loop Rilevamento"
    icon: mdi:shield-lock

  aspiratore_master_debug:                                                     # [CONFIGURAZIONE 0 RICHIAMI] [AUTOMAZIONE, PIU' RICHIAMI] [INTERFACCIA, 0 RICHIAMI]  SENSORE BOOLEANO PER MOSTRARE TRAMITE NOTIFICA PERSISTENTE L'OPZIONE ATTIVATA NELL'AUTOMAZIONE TRAMITE TRIGGER
    name: "Mostra Notifiche Debug"
    icon: mdi:shield-lock
################### Fine Creazione Switch Booleani impiegati nell'Interfaccia Lovelace per mostrare o meno le Opzioni ######################################################################################################

################### Inizio Creazione input datetime per l'accensione e lo spegnimento della aspiratore per ogni giorno della settimana #####################################################################################
input_datetime:
  aspiratore_master_impostazioni_umidita_start_time:                           # [CONFIGURAZIONE, PIU’ RICHIAMI] [INTERFACCIA, PIU’ RICHIAMI] [AUTOMAZIONE,0 RICHIAMI]
    name: Ora Inizio Impostazioni
    has_date: false
    has_time: true
    icon: mdi:timer-play-outline

  aspiratore_master_impostazioni_umidita_end_time:                             # [CONFIGURAZIONE, PIU’ RICHIAMI] [INTERFACCIA, PIU’ RICHIAMI] [AUTOMAZIONE,0 RICHIAMI]
    name: Ora Fine Impostazioni
    has_date: false
    has_time: true
    icon: mdi:timer-stop-outline

  aspiratore_master_impostazioni_rilevamento_start_time:                       # [CONFIGURAZIONE, PIU’ RICHIAMI] [INTERFACCIA, PIU’ RICHIAMI] [AUTOMAZIONE,0 RICHIAMI]
    name: Ora Inizio Impostazioni
    has_date: false
    has_time: true
    icon: mdi:timer-play-outline

  aspiratore_master_impostazioni_rilevamento_end_time:                         # [CONFIGURAZIONE, PIU’ RICHIAMI] [INTERFACCIA, PIU’ RICHIAMI] [AUTOMAZIONE,0 RICHIAMI]
    name: Ora Fine Impostazioni
    has_date: false
    has_time: true
    icon: mdi:timer-stop-outline
################### Fine Creazione input datetime per l'accensione e lo spegnimento della aspiratore per ogni giorno della settimana #######################################################################################
timer:
  aspiratore_master_permanenza_umidita:
    name: "Timer Durata Umidità"
    icon: mdi:timer-sand
    restore: false # Mantiene il timer non attivo se riavvii Home Assistant
    
  aspiratore_master_ciclo:
    name: "Timer Controllo Stato Aspiratore"
    icon: mdi:timer-sand
    restore: false # Mantiene il timer non attivo se riavvii Home Assistant

  aspiratore_master_durata_aspirazione:
    name: "Timer Durata Aspirazione"
    icon: mdi:timer-sand
    restore: false # Mantiene il timer non attivo se riavvii Home Assistant

  aspiratore_master_ciclo_rilevamento:
    name: "Timer Controllo Stato Aspiratore"
    icon: mdi:timer-sand
    restore: false # Mantiene il timer non attivo se riavvii Home Assistant

  aspiratore_master_permanenza_rilevamento:
    name: "Timer Durata Aspirazione"
    icon: mdi:timer-sand
    restore: false # Mantiene il timer non attivo se riavvii Home Assistant
################### Inizio Creazione Scripts ###############################################################################################################################################################################
script:
################### Inizio Creazione Scripts SELEZIONA ENTITA' installate su Home Assistant ################################################################################################################################
  aspiratore_master_aggiorna_elenco_entita_aspiratori:
    alias: ASPIRATORE Master - Aggiorna Elenco Entità Attuatore (Switch/Fan)
    sequence:
      - action: input_select.set_options
        target:
          entity_id: input_select.aspiratore_master_selected_actuator_entity
        data:
          options: >
            {# Unisco switch e fan in un'unica lista #}
            {% set entities =
              (states.switch | map(attribute='entity_id') | list)
              +
              (states.fan | map(attribute='entity_id') | list)
            %}
            {# Filtro usando la Regex flessibile per escludere i sensori di supporto #}
            {% set filtered = entities
              | reject('search', 'aspiratore_.*attuatore_.*selezionato')
